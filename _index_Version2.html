<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1426 100%);
            background-attachment: fixed;
            color: #FAF9F6;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        
        h1, h2, h3 { font-family: 'Playfair Display', serif; color: #D4AF37; letter-spacing: -0.5px; }
        
        /* iOS Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(212, 175, 55, 0.1);
            animation: slideInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .glass-gold {
            background: rgba(212, 175, 55, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1.5px solid rgba(212, 175, 55, 0.25);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        /* Animations */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        
        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #D4AF37 0%, #e5c158 100%);
            color: #050505;
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.3);
            border: none;
        }
        
        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(212, 175, 55, 0.5);
        }
        
        .btn-primary:active {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(212, 175, 55, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #D4AF37;
            border: 1.5px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.2);
        }
        
        .btn-danger {
            background: rgba(220, 38, 38, 0.2);
            color: #f87171;
            border: 1.5px solid rgba(220, 38, 38, 0.5);
        }
        
        .btn-danger:hover {
            background: rgba(220, 38, 38, 0.3);
            transform: translateY(-2px);
        }
        
        /* Inputs */
        input, select {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px 16px;
            color: #FAF9F6;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 14px;
            backdrop-filter: blur(10px);
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #D4AF37;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3), inset 0 0 10px rgba(212, 175, 55, 0.1);
        }
        
        /* Header */
        header {
            background: rgba(15, 20, 38, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        header h1 {
            font-size: 32px;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        
        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        main {
            padding: 24px;
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }
        
        /* Hero Cards */
        .hero-card {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .hero-stat {
            padding: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .hero-stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: shimmer 3s infinite;
        }
        
        .hero-stat h3 {
            font-size: 13px;
            color: #D4AF37;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            opacity: 0.8;
        }
        
        .hero-stat .value {
            font-size: 36px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            position: relative;
            z-index: 1;
        }
        
        /* Filter Section */
        .filter-section {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
            align-items: end;
        }
        
        /* Chart Container */
        .chart-container {
            padding: 24px;
            margin-bottom: 30px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        /* Table */
        .table-wrapper {
            padding: 24px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        thead {
            border-bottom: 2px solid rgba(212, 175, 55, 0.5);
        }
        
        th {
            padding: 16px;
            text-align: left;
            color: #D4AF37;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 12px;
        }
        
        td {
            padding: 16px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            color: #FAF9F6;
        }
        
        tr {
            transition: all 0.3s ease;
        }
        
        tr:hover {
            background: rgba(212, 175, 55, 0.08);
        }
        
        .amount-in {
            color: #4ade80;
            font-weight: 600;
        }
        
        .amount-out {
            color: #f87171;
            font-weight: 600;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            padding: 32px;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            animation: slideInUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            font-size: 24px;
            color: #D4AF37;
            margin-bottom: 24px;
            font-family: 'Playfair Display', serif;
        }
        
        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-size: 12px;
            color: #D4AF37;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        
        /* Footer */
        footer {
            background: rgba(15, 20, 38, 0.7);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding: 20px;
            text-align: center;
            color: rgba(250, 249, 246, 0.6);
            font-size: 12px;
            margin-top: 40px;
            backdrop-filter: blur(20px);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(250, 249, 246, 0.5);
        }
        
        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #D4AF37;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 14px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(212, 175, 55, 0.15);
            color: #D4AF37;
            animation: slideInUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 2000;
            max-width: 300px;
            word-wrap: break-word;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 16px; }
            header h1 { font-size: 24px; }
            main { padding: 16px; }
            .filter-section { grid-template-columns: 1fr; }
            .hero-card { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>THE LEDGER</h1>
            <button class="btn btn-primary" onclick="exportPDF()">📄 Export PDF</button>
        </header>

        <main>
            <div class="hero-card glass-gold">
                <div class="hero-stat">
                    <h3>Net Surplus</h3>
                    <div class="value" id="netSurplus">₹0.00</div>
                </div>
                <div class="hero-stat">
                    <h3>Total Credits</h3>
                    <div class="value amount-in" id="totalCredits">₹0.00</div>
                </div>
                <div class="hero-stat">
                    <h3>Total Expenses</h3>
                    <div class="value amount-out" id="totalExpenses">₹0.00</div>
                </div>
            </div>

            <div class="filter-section glass">
                <input type="text" id="search" placeholder="🔍 Search...">
                <input type="date" id="startDate">
                <input type="date" id="endDate">
                <button class="btn btn-secondary" onclick="applyFilter()">Filter</button>
                <button class="btn btn-secondary" onclick="resetFilter()">Reset</button>
                <button class="btn btn-primary" onclick="openAddModal()">+ Add Entry</button>
            </div>

            <div class="chart-container glass-gold">
                <canvas id="analyticsChart"></canvas>
            </div>

            <div class="table-wrapper glass">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Title</th>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <h3>No entries yet</h3>
                    <p>Start by adding your first transaction</p>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Elite Ledger. Crafted with precision.</p>
        </footer>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-content glass-gold">
            <div class="modal-header">Add New Entry</div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" placeholder="e.g., Grocery Shopping">
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="type">
                        <option value="expense">Expense</option>
                        <option value="credit">Credit</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveEntry()">Save Entry</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        const STORAGE_KEY = 'elite_ledger';
        let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let chart = null;

        function init() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            document.getElementById('startDate').value = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
            document.getElementById('endDate').value = today;
            render();
        }

        function saveEntry() {
            const title = document.getElementById('title').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('type').value;
            const date = document.getElementById('date').value;

            if (!title || !amount || !date || amount <= 0) {
                toast('❌ Please fill all fields correctly');
                return;
            }

            data.unshift({ id: Date.now(), title, amount, type, date });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            closeModal('addModal');
            document.getElementById('title').value = '';
            document.getElementById('amount').value = '';
            render();
            toast('✅ Entry added successfully');
        }

        function deleteEntry(id) {
            data = data.filter(e => e.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            render();
            toast('🗑 Deleted successfully');
        }

        function render() {
            const search = document.getElementById('search').value.toLowerCase();
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;

            const filtered = data.filter(e => 
                e.title.toLowerCase().includes(search) &&
                (!start || e.date >= start) &&
                (!end || e.date <= end)
            );

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            if (filtered.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
            } else {
                document.getElementById('emptyState').style.display = 'none';
                filtered.forEach(e => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${new Date(e.date).toLocaleDateString('en-IN')}</td>
                        <td>${e.title}</td>
                        <td>${e.type === 'credit' ? '💰' : '💸'}</td>
                        <td class="${e.type === 'credit' ? 'amount-in' : 'amount-out'}">${e.type === 'credit' ? '+' : '-'}₹${e.amount.toFixed(2)}</td>
                        <td><button class="btn btn-danger" style="padding: 5px 10px; font-size: 12px;" onclick="deleteEntry(${e.id})">Delete</button></td>
                    `;
                });
            }

            updateStats();
            updateChart();
        }

        function updateStats() {
            const credits = data.reduce((s, e) => e.type === 'credit' ? s + e.amount : s, 0);
            const expenses = data.reduce((s, e) => e.type === 'expense' ? s + e.amount : s, 0);
            const net = credits - expenses;

            document.getElementById('totalCredits').textContent = `₹${credits.toFixed(2)}`;
            document.getElementById('totalExpenses').textContent = `₹${expenses.toFixed(2)}`;
            document.getElementById('netSurplus').textContent = `₹${net.toFixed(2)}`;
            document.getElementById('netSurplus').style.color = net >= 0 ? '#4ade80' : '#f87171';
        }

        function updateChart() {
            const credits = data.reduce((s, e) => e.type === 'credit' ? s + e.amount : s, 0);
            const expenses = data.reduce((s, e) => e.type === 'expense' ? s + e.amount : s, 0);

            const ctx = document.getElementById('analyticsChart').getContext('2d');
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Credits', 'Expenses'],
                    datasets: [{
                        data: [credits, expenses],
                        backgroundColor: ['#4ade80', '#f87171'],
                        borderColor: '#0f1426',
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#FAF9F6' } } }
                }
            });
        }

        function openAddModal() { document.getElementById('addModal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function applyFilter() { render(); }
        function resetFilter() {
            document.getElementById('search').value = '';
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').value = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
            document.getElementById('endDate').value = today;
            render();
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const margin = 15;
            const contentWidth = pageWidth - (2 * margin);

            pdf.setFillColor(255, 255, 255);
            pdf.rect(0, 0, pageWidth, pageHeight, 'F');

            pdf.setFillColor(212, 175, 55);
            pdf.rect(0, 0, pageWidth, 25, 'F');
            pdf.setTextColor(5, 5, 5);
            pdf.setFont('Helvetica', 'bold');
            pdf.setFontSize(20);
            pdf.text('THE LEDGER', pageWidth / 2, 16, { align: 'center' });

            pdf.setTextColor(100, 100, 100);
            pdf.setFontSize(9);
            pdf.setFont('Helvetica', 'normal');
            pdf.text(`Generated: ${new Date().toLocaleDateString('en-IN')}`, margin, 35);

            const credits = data.reduce((s, e) => e.type === 'credit' ? s + e.amount : s, 0);
            const expenses = data.reduce((s, e) => e.type === 'expense' ? s + e.amount : s, 0);
            const net = credits - expenses;

            const boxY = 42;
            const boxHeight = 18;
            const boxWidth = (contentWidth / 3) - 2;

            pdf.setFillColor(230, 230, 230);
            pdf.rect(margin, boxY, boxWidth, boxHeight, 'F');
            pdf.setDrawColor(180, 180, 180);
            pdf.rect(margin, boxY, boxWidth, boxHeight);
            pdf.setFont('Helvetica', 'bold');
            pdf.setFontSize(9);
            pdf.setTextColor(50, 50, 50);
            pdf.text('Net Surplus', margin + 2, boxY + 6);
            pdf.setFontSize(11);
            pdf.setTextColor(net >= 0 ? 50 : 200, net >= 0 ? 150 : 50, net >= 0 ? 50 : 50);
            pdf.text(`₹${net.toFixed(2)}`, margin + 2, boxY + 14);

            pdf.setFillColor(230, 250, 230);
            pdf.rect(margin + boxWidth + 2, boxY, boxWidth, boxHeight, 'F');
            pdf.setDrawColor(100, 200, 100);
            pdf.rect(margin + boxWidth + 2, boxY, boxWidth, boxHeight);
            pdf.setFont('Helvetica', 'bold');
            pdf.setFontSize(9);
            pdf.setTextColor(50, 50, 50);
            pdf.text('Credits', margin + boxWidth + 4, boxY + 6);
            pdf.setFontSize(11);
            pdf.setTextColor(50, 150, 50);
            pdf.text(`₹${credits.toFixed(2)}`, margin + boxWidth + 4, boxY + 14);

            pdf.setFillColor(255, 240, 240);
            pdf.rect(margin + (boxWidth + 2) * 2, boxY, boxWidth, boxHeight, 'F');
            pdf.setDrawColor(200, 100, 100);
            pdf.rect(margin + (boxWidth + 2) * 2, boxY, boxWidth, boxHeight);
            pdf.setFont('Helvetica', 'bold');
            pdf.setFontSize(9);
            pdf.setTextColor(50, 50, 50);
            pdf.text('Expenses', margin + (boxWidth + 2) * 2 + 2, boxY + 6);
            pdf.setFontSize(11);
            pdf.setTextColor(200, 50, 50);
            pdf.text(`₹${expenses.toFixed(2)}`, margin + (boxWidth + 2) * 2 + 2, boxY + 14);

            const tableStartY = 68;
            const colWidths = [25, 50, 20, 35, 30];
            const headers = ['Date', 'Title', 'Type', 'Amount', 'Remark'];

            pdf.setFillColor(212, 175, 55);
            pdf.rect(margin, tableStartY, contentWidth, 8, 'F');
            pdf.setTextColor(255, 255, 255);
            pdf.setFont('Helvetica', 'bold');
            pdf.setFontSize(10);

            let xPos = margin;
            headers.forEach((header, index) => {
                pdf.text(header, xPos + 1, tableStartY + 6);
                if (index < headers.length - 1) {
                    pdf.setDrawColor(180, 150, 50);
                    pdf.line(xPos + colWidths[index], tableStartY, xPos + colWidths[index], tableStartY + 8);
                }
                xPos += colWidths[index];
            });

            let currentY = tableStartY + 10;
            const rowHeight = 7;
            let rowIndex = 0;

            data.forEach((entry) => {
                if (currentY > pageHeight - 20) {
                    pdf.addPage();
                    currentY = margin;
                }

                if (rowIndex % 2 === 0) {
                    pdf.setFillColor(248, 248, 248);
                } else {
                    pdf.setFillColor(255, 255, 255);
                }
                pdf.rect(margin, currentY - 2, contentWidth, rowHeight, 'F');
                pdf.setDrawColor(200, 200, 200);
                pdf.rect(margin, currentY - 2, contentWidth, rowHeight);

                const isCredit = entry.type === 'credit';
                pdf.setTextColor(isCredit ? 50 : 200, isCredit ? 150 : 50, isCredit ? 50 : 50);
                pdf.setFont('Helvetica', 'normal');
                pdf.setFontSize(9);

                xPos = margin + 1;
                pdf.text(new Date(entry.date).toLocaleDateString('en-IN'), xPos, currentY + 4);
                xPos += colWidths[0];

                const titleText = entry.title.length > 12 ? entry.title.substring(0, 10) + '..' : entry.title;
                pdf.text(titleText, xPos, currentY + 4);
                xPos += colWidths[1];

                pdf.setTextColor(isCredit ? 50 : 200, isCredit ? 150 : 50, isCredit ? 50 : 50);
                pdf.text(isCredit ? '✓ Credit' : '✗ Exp', xPos, currentY + 4);
                xPos += colWidths[2];

                pdf.text(`${isCredit ? '+' : '-'}₹${entry.amount.toFixed(2)}`, xPos, currentY + 4);

                let dividerX = margin;
                for (let i = 0; i < colWidths.length; i++) {
                    dividerX += colWidths[i];
                    if (i < colWidths.length - 1) {
                        pdf.setDrawColor(220, 220, 220);
                        pdf.line(dividerX, currentY - 2, dividerX, currentY + rowHeight - 2);
                    }
                }

                currentY += rowHeight;
                rowIndex++;
            });

            pdf.setTextColor(150, 150, 150);
            pdf.setFont('Helvetica', 'italic');
            pdf.setFontSize(8);
            pdf.text('Elite Ledger © 2026 | Confidential Financial Statement', pageWidth / 2, pageHeight - 5, { align: 'center' });

            pdf.save('elite-ledger-statement.pdf');
            toast('✅ PDF exported successfully!');
        }

        function toast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        init();
    </script>
</body>
</html>
