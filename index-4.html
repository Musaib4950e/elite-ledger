<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Elite Ledger</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});</script>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F0CC5A;
            --gold-dim: rgba(212,175,55,0.18);
            --gold-border: rgba(212,175,55,0.28);
            --green: #34d399;
            --red: #f87171;
            --bg1: #070b1a;
            --bg2: #0f1428;
            --text: #F5F3EE;
            --text-dim: rgba(245,243,238,0.55);
            --glass: rgba(255,255,255,0.065);
            --glass-border: rgba(255,255,255,0.12);
            --blur: blur(28px);
            --radius: 22px;
            --radius-sm: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg1);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(212,175,55,0.12) 0%, transparent 70%);
            top: -100px; right: -100px;
            animation: orb1 8s ease-in-out infinite alternate;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
            bottom: 100px; left: -80px;
            animation: orb2 10s ease-in-out infinite alternate;
        }
        @keyframes orb1 { from { transform: translate(0,0); } to { transform: translate(-40px, 60px); } }
        @keyframes orb2 { from { transform: translate(0,0); } to { transform: translate(50px, -40px); } }
        .glass {
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            position: relative;
            z-index: 1;
        }
        .glass-gold {
            background: var(--gold-dim);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1.5px solid var(--gold-border);
            border-radius: var(--radius);
            position: relative;
            z-index: 1;
        }
        .glass-gold::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius);
            background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
            pointer-events: none;
        }
        header {
            position: sticky; top: 0; z-index: 200;
            padding: env(safe-area-inset-top, 0) 0 0;
            background: rgba(7,11,26,0.6);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--gold-border);
        }
        .header-inner {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px;
        }
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px; font-weight: 900;
            letter-spacing: 4px; color: var(--gold);
            text-shadow: 0 0 30px rgba(212,175,55,0.4);
        }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .btn {
            border: none; cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600; letter-spacing: 0.5px;
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn:active { transform: scale(0.94); }
        .btn-gold {
            background: linear-gradient(135deg, #D4AF37, #F0CC5A);
            color: #050505;
            padding: 11px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            box-shadow: 0 6px 20px rgba(212,175,55,0.35);
        }
        .btn-gold:hover { box-shadow: 0 10px 28px rgba(212,175,55,0.5); }
        .btn-glass {
            background: var(--glass);
            color: var(--gold);
            border: 1px solid var(--gold-border);
            padding: 11px 18px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            backdrop-filter: blur(10px);
        }
        .btn-glass:hover { background: var(--gold-dim); }
        .btn-icon {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--gold);
            width: 40px; height: 40px;
            border-radius: 12px; font-size: 16px;
            backdrop-filter: blur(10px);
        }
        .btn-icon:hover { background: var(--gold-dim); border-color: var(--gold-border); }
        .btn-danger {
            background: rgba(248,113,113,0.12);
            color: var(--red);
            border: 1px solid rgba(248,113,113,0.3);
            padding: 7px 12px;
            border-radius: 10px; font-size: 12px;
        }
        .btn-edit {
            background: rgba(212,175,55,0.12);
            color: var(--gold);
            border: 1px solid var(--gold-border);
            padding: 7px 12px;
            border-radius: 10px; font-size: 12px;
        }
        main {
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            display: flex; flex-direction: column; gap: 20px;
            padding-bottom: 40px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .stat-card {
            padding: 18px 14px;
            text-align: center;
            overflow: hidden;
        }
        .stat-label {
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--gold);
            opacity: 0.7; margin-bottom: 8px; font-weight: 600;
        }
        .stat-value { font-size: 20px; font-weight: 700; line-height: 1; }
        @media (max-width: 400px) {
            .stat-value { font-size: 16px; }
            .stat-label { font-size: 9px; }
        }
        .category-pill {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            border: 1.5px solid transparent; white-space: nowrap;
        }
        .category-pill.active {
            border-color: var(--gold);
            background: var(--gold-dim); color: var(--gold);
        }
        .category-pill:not(.active) {
            background: var(--glass); color: var(--text-dim);
            border-color: var(--glass-border);
        }
        .pills-scroll {
            display: flex; gap: 8px;
            overflow-x: auto; padding-bottom: 4px;
            scrollbar-width: none;
        }
        .pills-scroll::-webkit-scrollbar { display: none; }
        .filter-card { padding: 16px; }
        .filter-row {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-bottom: 10px;
        }
        .search-wrap { position: relative; margin-bottom: 10px; }
        .search-wrap input { width: 100%; padding-left: 40px; }
        .search-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim); font-size: 15px; pointer-events: none;
        }
        input, select, textarea {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 14px; width: 100%;
            transition: all 0.2s;
            -webkit-appearance: none;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--gold);
            background: rgba(212,175,55,0.07);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
        }
        select option { background: #0f1428; color: var(--text); }
        .chart-card {
            padding: 20px; height: 260px;
            display: flex; align-items: center; justify-content: center;
        }
        .entries-card { padding: 0; overflow: hidden; }
        .entries-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--gold-border);
        }
        .entries-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px; color: var(--gold);
        }
        .entry-count {
            font-size: 12px; color: var(--text-dim);
            background: var(--glass); padding: 4px 10px;
            border-radius: 20px; border: 1px solid var(--glass-border);
        }
        .entry-row {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
            animation: fadeSlide 0.3s ease forwards;
        }
        .entry-row:last-child { border-bottom: none; }
        .entry-row:hover { background: rgba(255,255,255,0.03); }
        .entry-icon {
            width: 42px; height: 42px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .entry-icon.credit { background: rgba(52,211,153,0.15); }
        .entry-icon.expense { background: rgba(248,113,113,0.15); }
        .entry-info { flex: 1; min-width: 0; }
        .entry-title {
            font-weight: 600; font-size: 14px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .entry-meta {
            font-size: 11px; color: var(--text-dim); margin-top: 2px;
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
        }
        .cat-badge {
            padding: 2px 8px; border-radius: 6px;
            font-size: 10px; font-weight: 600;
        }
        .entry-right { text-align: right; flex-shrink: 0; }
        .entry-amount { font-size: 15px; font-weight: 700; }
        .entry-amount.credit { color: var(--green); }
        .entry-amount.expense { color: var(--red); }
        .entry-balance { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
        .entry-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .modal-overlay {
            display: none; position: fixed;
            inset: 0; z-index: 500;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: flex-end; align-items: flex-end;
        }
        .modal-overlay.active { display: flex; }
        .modal-sheet {
            width: 100%; max-width: 600px;
            margin: 0 auto;
            background: #111827;
            border: 1px solid var(--gold-border);
            border-radius: 28px 28px 0 0;
            padding: 0 0 env(safe-area-inset-bottom, 20px);
            animation: sheetUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
            max-height: 92vh; overflow-y: auto;
        }
        @keyframes sheetUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .sheet-handle {
            width: 40px; height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px; margin: 14px auto 0;
        }
        .sheet-header {
            padding: 16px 24px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sheet-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px; color: var(--gold);
        }
        .sheet-close {
            width: 32px; height: 32px; border-radius: 50%;
            background: var(--glass); border: 1px solid var(--glass-border);
            color: var(--text-dim); font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .sheet-body {
            padding: 20px 24px;
            display: flex; flex-direction: column; gap: 14px;
        }
        .form-label {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.2px;
            color: var(--gold); opacity: 0.8;
            margin-bottom: 6px; display: block;
        }
        .type-toggle {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
        }
        .type-btn {
            padding: 12px; border-radius: var(--radius-sm);
            border: 1.5px solid var(--glass-border);
            background: var(--glass); color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .type-btn.active-expense {
            border-color: var(--red);
            background: rgba(248,113,113,0.12); color: var(--red);
        }
        .type-btn.active-credit {
            border-color: var(--green);
            background: rgba(52,211,153,0.12); color: var(--green);
        }
        .sheet-footer {
            padding: 0 24px 20px;
            display: flex; gap: 10px;
        }
        .sheet-footer .btn { flex: 1; padding: 14px; font-size: 15px; border-radius: var(--radius-sm); }
        .empty-state {
            text-align: center; padding: 50px 20px; color: var(--text-dim);
        }
        .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 20px; color: var(--gold); margin-bottom: 8px; font-family: 'Playfair Display', serif; }
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            padding: 13px 22px; border-radius: 40px;
            background: rgba(20,27,50,0.95);
            border: 1px solid var(--gold-border);
            color: var(--text); font-size: 14px; font-weight: 500;
            backdrop-filter: blur(20px); z-index: 9999;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        footer {
            text-align: center; padding: 24px 20px;
            color: var(--text-dim); font-size: 11px;
            border-top: 1px solid var(--gold-border);
            margin-top: 10px; position: relative; z-index: 1;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="header-title">THE LEDGER</div>
        <div class="header-actions">
            <button class="btn btn-icon" onclick="exportPDF()" title="Export PDF">📄</button>
            <button class="btn btn-gold" onclick="openAddModal()">＋ Add</button>
        </div>
    </div>
</header>

<main>
    <div class="stats-grid">
        <div class="stat-card glass-gold">
            <div class="stat-label">Net Surplus</div>
            <div class="stat-value" id="netSurplus">₹0</div>
        </div>
        <div class="stat-card glass">
            <div class="stat-label">Credits</div>
            <div class="stat-value" style="color:var(--green)" id="totalCredits">₹0</div>
        </div>
        <div class="stat-card glass">
            <div class="stat-label">Expenses</div>
            <div class="stat-value" style="color:var(--red)" id="totalExpenses">₹0</div>
        </div>
    </div>

    <div class="chart-card glass-gold">
        <canvas id="analyticsChart"></canvas>
    </div>

    <div class="filter-card glass">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" placeholder="Search transactions...">
        </div>
        <div class="filter-row">
            <input type="date" id="startDate">
            <input type="date" id="endDate">
        </div>
        <div class="pills-scroll" id="categoryFilter"></div>
        <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="btn btn-glass" style="flex:1" onclick="applyFilter()">Filter</button>
            <button class="btn btn-glass" style="flex:1" onclick="resetFilter()">Reset</button>
        </div>
    </div>

    <div class="entries-card glass">
        <div class="entries-header">
            <div class="entries-title">Transactions</div>
            <div class="entry-count" id="entryCount">0 entries</div>
        </div>
        <div id="entriesList"></div>
        <div id="emptyState" class="empty-state" style="display:none">
            <div class="emoji">💸</div>
            <h3>No entries yet</h3>
            <p>Tap <strong>+ Add</strong> to record your first transaction</p>
        </div>
    </div>
</main>

<footer>© 2026 Elite Ledger · Crafted with precision</footer>

<div class="modal-overlay" id="addModal">
    <div class="modal-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <div class="sheet-title" id="modalTitle">New Entry</div>
            <button class="sheet-close" onclick="closeModal()">✕</button>
        </div>
        <div class="sheet-body">
            <div>
                <label class="form-label">Type</label>
                <div class="type-toggle">
                    <button class="type-btn active-expense" id="typeExpense" onclick="setType('expense')">💸 Expense</button>
                    <button class="type-btn" id="typeCredit" onclick="setType('credit')">💰 Credit</button>
                </div>
            </div>
            <div>
                <label class="form-label">Title</label>
                <input type="text" id="entryTitle" placeholder="e.g. Grocery Shopping">
            </div>
            <div>
                <label class="form-label">Amount (₹)</label>
                <input type="number" id="entryAmount" placeholder="0.00" step="0.01" inputmode="decimal">
            </div>
            <div>
                <label class="form-label">Category</label>
                <select id="entryCategory">
                    <option value="General">📦 General</option>
                    <option value="Food">🍔 Food</option>
                    <option value="Transport">🚗 Transport</option>
                    <option value="Shopping">🛍️ Shopping</option>
                    <option value="Bills">💡 Bills</option>
                    <option value="Health">🏥 Health</option>
                    <option value="Salary">💼 Salary</option>
                    <option value="Entertainment">🎬 Entertainment</option>
                    <option value="Education">📚 Education</option>
                    <option value="Other">🔖 Other</option>
                </select>
            </div>
            <div>
                <label class="form-label">Notes (optional)</label>
                <input type="text" id="entryNotes" placeholder="Add a note...">
            </div>
            <div>
                <label class="form-label">Date</label>
                <input type="date" id="entryDate">
            </div>
        </div>
        <div class="sheet-footer">
            <button class="btn btn-glass" onclick="closeModal()">Cancel</button>
            <button class="btn btn-gold" onclick="saveEntry()">Save Entry</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const STORAGE_KEY = 'elite_ledger_v2';
let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let chart = null;
let editId = null;
let currentType = 'expense';
let activeCategory = 'All';

const CATEGORIES = ['All','General','Food','Transport','Shopping','Bills','Health','Salary','Entertainment','Education','Other'];
const CAT_COLORS = { General:'#94a3b8',Food:'#fb923c',Transport:'#60a5fa',Shopping:'#f472b6',Bills:'#facc15',Health:'#34d399',Salary:'#D4AF37',Entertainment:'#a78bfa',Education:'#38bdf8',Other:'#9ca3af' };
const CAT_EMOJI = { General:'📦',Food:'🍔',Transport:'🚗',Shopping:'🛍️',Bills:'💡',Health:'🏥',Salary:'💼',Entertainment:'🎬',Education:'📚',Other:'🔖' };

function init() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('entryDate').value = today;
    document.getElementById('startDate').value = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
    document.getElementById('endDate').value = today;
    buildCategoryFilter();
    render();
}

function buildCategoryFilter() {
    const wrap = document.getElementById('categoryFilter');
    wrap.innerHTML = CATEGORIES.map(cat =>
        `<span class="category-pill ${cat===activeCategory?'active':''}" onclick="filterByCategory('${cat}')">${cat==='All'?'✦ All':(CAT_EMOJI[cat]||'')+' '+cat}</span>`
    ).join('');
}

function filterByCategory(cat) { activeCategory=cat; buildCategoryFilter(); render(); }

function setType(type) {
    currentType = type;
    document.getElementById('typeExpense').className = 'type-btn '+(type==='expense'?'active-expense':'');
    document.getElementById('typeCredit').className = 'type-btn '+(type==='credit'?'active-credit':'');
}

function openAddModal(id=null) {
    editId = id;
    if (id) {
        const e = data.find(x=>x.id===id);
        document.getElementById('modalTitle').textContent = 'Edit Entry';
        document.getElementById('entryTitle').value = e.title;
        document.getElementById('entryAmount').value = e.amount;
        document.getElementById('entryCategory').value = e.category||'General';
        document.getElementById('entryNotes').value = e.notes||'';
        document.getElementById('entryDate').value = e.date;
        setType(e.type);
    } else {
        document.getElementById('modalTitle').textContent = 'New Entry';
        document.getElementById('entryTitle').value = '';
        document.getElementById('entryAmount').value = '';
        document.getElementById('entryCategory').value = 'General';
        document.getElementById('entryNotes').value = '';
        document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
        setType('expense');
    }
    document.getElementById('addModal').classList.add('active');
}

function closeModal() { document.getElementById('addModal').classList.remove('active'); editId=null; }

function saveEntry() {
    const title = document.getElementById('entryTitle').value.trim();
    const amount = parseFloat(document.getElementById('entryAmount').value);
    const category = document.getElementById('entryCategory').value;
    const notes = document.getElementById('entryNotes').value.trim();
    const date = document.getElementById('entryDate').value;
    if (!title||!amount||!date||amount<=0) { toast('❌ Fill all required fields'); return; }
    if (editId) {
        const idx = data.findIndex(x=>x.id===editId);
        data[idx] = {...data[idx],title,amount,type:currentType,category,notes,date};
        toast('✅ Entry updated');
    } else {
        data.unshift({id:Date.now(),title,amount,type:currentType,category,notes,date});
        toast('✅ Entry added');
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    closeModal(); render();
}

function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    data = data.filter(e=>e.id!==id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    render(); toast('🗑️ Deleted');
}

function getFiltered() {
    const search = document.getElementById('search').value.toLowerCase();
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    return data.filter(e =>
        e.title.toLowerCase().includes(search) &&
        (!start||e.date>=start) && (!end||e.date<=end) &&
        (activeCategory==='All'||e.category===activeCategory)
    );
}

function render() {
    const filtered = getFiltered();
    const list = document.getElementById('entriesList');
    const empty = document.getElementById('emptyState');

    // Running balance map
    const sorted = [...data].sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
    let r=0; const balMap={};
    sorted.forEach(e=>{ r+=e.type==='credit'?e.amount:-e.amount; balMap[e.id]=r; });

    if (filtered.length===0) {
        list.innerHTML=''; empty.style.display='block';
        document.getElementById('entryCount').textContent='0 entries';
    } else {
        empty.style.display='none';
        document.getElementById('entryCount').textContent=`${filtered.length} entr${filtered.length===1?'y':'ies'}`;
        list.innerHTML=filtered.map((e,i)=>{
            const cat=e.category||'General';
            const color=CAT_COLORS[cat]||'#94a3b8';
            const emoji=CAT_EMOJI[cat]||'📦';
            const bal=balMap[e.id]||0;
            return `<div class="entry-row" style="animation-delay:${i*0.04}s">
                <div class="entry-icon ${e.type}">${e.type==='credit'?'💰':'💸'}</div>
                <div class="entry-info">
                    <div class="entry-title">${e.title}</div>
                    <div class="entry-meta">
                        <span>${new Date(e.date+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>
                        <span class="cat-badge" style="background:${color}22;color:${color}">${emoji} ${cat}</span>
                        ${e.notes?`<span style="color:var(--text-dim);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90px">${e.notes}</span>`:''}
                    </div>
                </div>
                <div class="entry-right">
                    <div class="entry-amount ${e.type}">${e.type==='credit'?'+':'-'}₹${e.amount.toFixed(2)}</div>
                    <div class="entry-balance">bal ₹${bal.toFixed(0)}</div>
                </div>
                <div class="entry-actions">
                    <button class="btn btn-edit" onclick="openAddModal(${e.id})">✏️</button>
                    <button class="btn btn-danger" onclick="deleteEntry(${e.id})">🗑️</button>
                </div>
            </div>`;
        }).join('');
    }
    updateStats(); updateChart();
}

function updateStats() {
    const credits=data.reduce((s,e)=>e.type==='credit'?s+e.amount:s,0);
    const expenses=data.reduce((s,e)=>e.type==='expense'?s+e.amount:s,0);
    const net=credits-expenses;
    document.getElementById('totalCredits').textContent=`₹${credits.toFixed(0)}`;
    document.getElementById('totalExpenses').textContent=`₹${expenses.toFixed(0)}`;
    document.getElementById('netSurplus').textContent=`₹${net.toFixed(0)}`;
    document.getElementById('netSurplus').style.color=net>=0?'var(--green)':'var(--red)';
}

function updateChart() {
    const ctx=document.getElementById('analyticsChart').getContext('2d');
    if (chart) chart.destroy();
    const months=[],creditData=[],expenseData=[];
    for (let i=5;i>=0;i--) {
        const d=new Date(); d.setMonth(d.getMonth()-i);
        const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        months.push(d.toLocaleDateString('en-IN',{month:'short'}));
        creditData.push(data.filter(e=>e.date.startsWith(key)&&e.type==='credit').reduce((s,e)=>s+e.amount,0));
        expenseData.push(data.filter(e=>e.date.startsWith(key)&&e.type==='expense').reduce((s,e)=>s+e.amount,0));
    }
    chart=new Chart(ctx,{
        type:'bar',
        data:{
            labels:months,
            datasets:[
                {label:'Credits',data:creditData,backgroundColor:'rgba(52,211,153,0.7)',borderRadius:8,borderSkipped:false},
                {label:'Expenses',data:expenseData,backgroundColor:'rgba(248,113,113,0.7)',borderRadius:8,borderSkipped:false}
            ]
        },
        options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{legend:{labels:{color:'#F5F3EE',font:{family:'Outfit',size:12},boxWidth:12,boxHeight:12}}},
            scales:{
                x:{ticks:{color:'rgba(245,243,238,0.6)',font:{family:'Outfit'}},grid:{color:'rgba(255,255,255,0.05)'}},
                y:{ticks:{color:'rgba(245,243,238,0.6)',font:{family:'Outfit'}},grid:{color:'rgba(255,255,255,0.05)'}}
            }
        }
    });
}

function applyFilter() { render(); }
function resetFilter() {
    document.getElementById('search').value='';
    const today=new Date().toISOString().split('T')[0];
    document.getElementById('startDate').value=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().split('T')[0];
    document.getElementById('endDate').value=today;
    activeCategory='All'; buildCategoryFilter(); render();
}

function exportPDF() {
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight(),m=15,cw=pw-2*m;
    pdf.setFillColor(255,255,255); pdf.rect(0,0,pw,ph,'F');
    pdf.setFillColor(212,175,55); pdf.rect(0,0,pw,28,'F');
    pdf.setTextColor(5,5,5); pdf.setFont('Helvetica','bold'); pdf.setFontSize(22);
    pdf.text('ELITE LEDGER',pw/2,17,{align:'center'});
    pdf.setFontSize(9); pdf.text('Financial Statement',pw/2,24,{align:'center'});
    pdf.setTextColor(120,120,120); pdf.setFontSize(8); pdf.setFont('Helvetica','normal');
    pdf.text(`Generated: ${new Date().toLocaleDateString('en-IN')}`,m,36);
    const credits=data.reduce((s,e)=>e.type==='credit'?s+e.amount:s,0);
    const expenses=data.reduce((s,e)=>e.type==='expense'?s+e.amount:s,0);
    const net=credits-expenses;
    const bw=(cw/3)-2,bh=20,by=42;
    [[230,230,230],[230,250,230],[255,235,235]].forEach((fill,i)=>{ pdf.setFillColor(...fill); pdf.rect(m+i*(bw+2),by,bw,bh,'F'); });
    [['Net Surplus',net,m+2],[' Credits',credits,m+bw+4],['Expenses',expenses,m+(bw+2)*2+2]].forEach(([label,val,x],i)=>{
        pdf.setFontSize(8); pdf.setFont('Helvetica','bold'); pdf.setTextColor(80,80,80); pdf.text(label,x,by+7);
        pdf.setFontSize(11);
        if(i===0) pdf.setTextColor(net>=0?50:200,net>=0?150:50,50);
        else if(i===1) pdf.setTextColor(50,150,50);
        else pdf.setTextColor(200,50,50);
        pdf.text(`Rs.${val.toFixed(2)}`,x,by+16);
    });
    const ty=70,cols=[22,42,18,18,30,20],headers=['Date','Title','Cat','Type','Amount','Bal'];
    pdf.setFillColor(212,175,55); pdf.rect(m,ty,cw,9,'F');
    pdf.setTextColor(255,255,255); pdf.setFont('Helvetica','bold'); pdf.setFontSize(9);
    let x=m+1; headers.forEach((h,i)=>{ pdf.text(h,x,ty+6); x+=cols[i]; });
    const sorted=[...data].sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
    let r2=0; const balMap={};
    sorted.forEach(e=>{ r2+=e.type==='credit'?e.amount:-e.amount; balMap[e.id]=r2; });
    let cy=ty+11,ri=0;
    data.forEach(entry=>{
        if(cy>ph-15){ pdf.addPage(); cy=m; }
        pdf.setFillColor(ri%2===0?248:255,ri%2===0?248:255,ri%2===0?248:255);
        pdf.rect(m,cy-2,cw,8,'F'); pdf.setDrawColor(220,220,220); pdf.rect(m,cy-2,cw,8);
        const ic=entry.type==='credit';
        pdf.setTextColor(ic?50:180,ic?130:50,50); pdf.setFont('Helvetica','normal'); pdf.setFontSize(8);
        x=m+1;
        const vals=[
            new Date(entry.date+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit',year:'2-digit'}),
            entry.title.length>16?entry.title.substring(0,14)+'..':entry.title,
            (entry.category||'Gen').substring(0,6),
            ic?'Credit':'Expense',
            `${ic?'+':'-'}Rs.${entry.amount.toFixed(0)}`,
            `Rs.${(balMap[entry.id]||0).toFixed(0)}`
        ];
        vals.forEach((v,i)=>{ pdf.text(String(v),x,cy+4); x+=cols[i]; });
        cy+=8; ri++;
    });
    pdf.setTextColor(160,160,160); pdf.setFont('Helvetica','italic'); pdf.setFontSize(7);
    pdf.text('Elite Ledger © 2026 | Confidential Financial Statement',pw/2,ph-5,{align:'center'});
    pdf.save('elite-ledger.pdf');
    toast('✅ PDF exported!');
}

function toast(msg) {
    document.querySelectorAll('.toast').forEach(t=>t.remove());
    const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
    document.body.appendChild(t); setTimeout(()=>t.remove(),2800);
}

document.getElementById('addModal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
init();
</script>
